workflows:
  ios-workflow:
    name: Simple iOS Build

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build || true

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Clean Xcode
        script: |
          cd ios/App
          xcodebuild clean \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS Simulator App
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
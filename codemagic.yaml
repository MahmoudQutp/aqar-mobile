  ```yaml
  workflows:
    ios-workflow:
      name: iOS Build

      max_build_duration: 120

      environment:
        node: latest

        vars:
          XCODE_PROJECT: "ios/App/App.xcodeproj"

      scripts:
        - name: Install dependencies
          script: |
            npm install

        - name: Build web assets
          script: |
            npm run build

        - name: Sync Capacitor
          script: |
            npx cap sync ios

        - name: Install CocoaPods
          script: |
            cd ios/App
            pod install

        - name: Build IPA
          script: |
            xcode-project build-ipa \
              --project "$XCODE_PROJECT" \
              --scheme App

      artifacts:
        - build/ios/ipa/*.ipa

      publishing:
        email:
          recipients:
            - aqarkam@gmail.com
          notify:
            success: true
            failure: true
    ```

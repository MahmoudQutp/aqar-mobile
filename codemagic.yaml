workflows:
  ios-workflow:
    name: Stable iOS Build

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build || true

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Clean project
        script: |
          cd ios/App
          xcodebuild clean \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS Simulator App
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app